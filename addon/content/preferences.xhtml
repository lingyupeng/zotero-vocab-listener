<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <checkbox
    id="zotero-prefpane-__addonRef__-enable"
    preference="enable"
    data-l10n-id="pref-enable"
  />
  <hbox>
    <html:label
      for="zotero-prefpane-__addonRef__-grayColors"
      data-l10n-id="pref-gray-colors"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-grayColors"
      preference="grayColors"
    ></html:input>
  </hbox>
  <html:p data-l10n-id="pref-gray-colors-help"></html:p>
  <hbox id="zotero-prefpane-__addonRef__-color-preview"></hbox>
  <html:h3 data-l10n-id="pref-fields-title"></html:h3>
  <checkbox
    id="zotero-prefpane-__addonRef__-fieldWord"
    preference="fieldWord"
    data-l10n-id="pref-field-word"
  />
  <checkbox
    id="zotero-prefpane-__addonRef__-fieldPaperTitle"
    preference="fieldPaperTitle"
    data-l10n-id="pref-field-paper-title"
  />
  <checkbox
    id="zotero-prefpane-__addonRef__-fieldExcerptDate"
    preference="fieldExcerptDate"
    data-l10n-id="pref-field-excerpt-date"
  />
  <checkbox
    id="zotero-prefpane-__addonRef__-fieldTranslation"
    preference="fieldTranslation"
    data-l10n-id="pref-field-translation"
  />
  <checkbox
    id="zotero-prefpane-__addonRef__-fieldContextSentence"
    preference="fieldContextSentence"
    data-l10n-id="pref-field-context"
  />
  <checkbox
    id="zotero-prefpane-__addonRef__-fieldPageLabel"
    preference="fieldPageLabel"
    data-l10n-id="pref-field-page"
  />
  <html:p id="zotero-prefpane-__addonRef__-records-summary"></html:p>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
